services:
  - type: web
    name: home-food-api
    env: python
    rootDir: .
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate --no-input
    startCommand: gunicorn HomeFood.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "home-food-api.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://home-food-frontend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://home-food-frontend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: home-food-db
          property: connectionString

  - type: static_site
    name: home-food-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    publishDir: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: "https://home-food-api.onrender.com/api"

databases:
  - name: home-food-db
